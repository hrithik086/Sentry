<div class="login-page">
  <div class="login-container">
    <div class="brand-section">
      <div class="brand-content">
        <img src="SentryLogo/SentryLogo.png" alt="Sentry Logo" class="brand-logo">
        <h2 class="brand-title">{{websiteTitle}}</h2>
        <p class="brand-tagline">{{tagLine}}</p>
      </div>
    </div>

    <div class="auth-section">
      <div class="auth-card">
        <div class="card-header">
          <h1 class="form-header">Welcome Back</h1>
          <p class="form-subheader">Please enter your details to sign in</p>
        </div>

        <form [formGroup]="loginForm" class="auth-form" (ngSubmit)="onSubmit()" autocomplete="off">
          <div class="input-group">
            <label for="username">Username</label>
            <input id="username" class="form-input" type="text" placeholder="Enter username" formControlName="username" />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input id="password" class="form-input" type="password" placeholder="Enter password" formControlName="password" />
          </div>

          <div class="input-group">
            <label>Master Key File</label>
            <input #fileInput id="fileInput" type="file" style="display:none" accept=".json" (change)="onFileSelected($event)" />
            <div class="file-upload-row">
              <label class="file-browse-btn" for="fileInput">Browse...</label>
              <span id="fileName" class="file-name-display">{{ selectedFileName || 'No file chosen' }}</span>
            </div>
          </div>

          <button type="submit" class="btn-primary full-width" [disabled]="loginForm.invalid">Sign In</button>
        </form>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="card-header">
          <h1 class="form-header">Create Account</h1>
          <p class="form-subheader">New to Sentry? Register here</p>
        </div>

        <form [formGroup]="registerForm" class="auth-form" (ngSubmit)="onRegister()" autocomplete="off">
          <div class="input-group">
            <label for="reg-username">Username</label>
            <input id="reg-username" class="form-input" type="text" placeholder="Choose a username" formControlName="username" />
          </div>
          <div class="input-group">
            <label for="reg-password">Password</label>
            <input id="reg-password" class="form-input" type="password" placeholder="Choose a strong password" formControlName="password" />
          </div>
          <button type="submit" class="btn-secondary full-width" [disabled]="registerForm.invalid">Register</button>
        </form>
      </div>
    </div>
  </div>
</div>
