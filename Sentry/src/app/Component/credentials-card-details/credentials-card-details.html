<div class="pw-card" (click)="toggleExpand(item.id)">
    <div class="card-top">
        <div class="avatar">{{ getInitials(item.domainName) }}</div>
        <div class="meta">
            <div class="site">{{ item.domainName }}</div>
            <div class="userId">{{ item.userId }}</div>
        </div>
        <div class="chev" [class.open]="item.expanded">▸</div>
    </div>
    
    <div class="card-body" [class.open]="item.expanded">
        <div class="row">
            <div class="label">Username / Email</div>
            <div class="value-container">
                <div class="value">{{ item.userId }}</div>
                <button
                    class="btn-icon"
                    (click)="copyToClipboard(item.userId); $event.stopPropagation()"
                >
                    Copy
                </button>
            </div>
        </div>

        <div class="row">
            <div class="label">Password</div>
            <div class="value-container">
                <div class="value pw">{{ item.showPassword ? item.password : mask(item.password) }}</div>
                <button class="btn-icon" (click)="togglePassword(item.id); $event.stopPropagation()">
                    {{ item.showPassword ? 'Hide' : 'Show' }}
                </button>
                <button
                    class="btn-icon"
                    (click)="copyToClipboard(item.password); $event.stopPropagation()"
                >
                    Copy
                </button>
            </div>
        </div>
    </div>
</div>
