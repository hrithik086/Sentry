<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <img src="SentryLogo/SentryLogo.png" alt="Sentry Logo" class="navbar-logo">
            <h1 class="navbar-title">SENTRY</h1>
        </div>
        
        <div class="navbar-actions">
            <button class="theme-toggle" (click)="themeService.toggleTheme()" aria-label="Toggle theme">

                    <mat-icon fontIcon="light_mode"></mat-icon>
                }
            </button>
        </div>
